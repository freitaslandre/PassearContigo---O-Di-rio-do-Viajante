<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/viagens"></ion-back-button>
    </ion-buttons>
    <ion-title>Adicionar POI</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form #poiForm="ngForm" (ngSubmit)="adicionarPoi()">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Dados do POI</ion-card-title>
        <ion-card-subtitle *ngIf="diaTitulo">Dia: {{ diaTitulo }}</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-item>
          <ion-label position="floating">Nome *</ion-label>
          <ion-input
            name="nome"
            [(ngModel)]="poi.nome"
            required
            type="text"
            placeholder="Nome do ponto de interesse"
          ></ion-input>
        </ion-item>
        <ion-text color="danger" *ngIf="poiForm.submitted && !poi.nome?.trim()">
          <small>Nome é obrigatório.</small>
        </ion-text>

        <ion-item>
          <ion-label position="floating">Descrição</ion-label>
          <ion-input
            name="descricao"
            [(ngModel)]="poi.descricao"
            type="text"
            placeholder="Descrição opcional"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Tipo</ion-label>
          <ion-input
            name="tipo"
            [(ngModel)]="poi.tipo"
            type="text"
            placeholder="Ex: Museu, Restaurante"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Endereço</ion-label>
          <ion-input
            name="endereco"
            [(ngModel)]="poi.endereco"
            type="text"
            placeholder="Endereço ou local"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Telefone</ion-label>
          <ion-input
            name="telefone"
            [(ngModel)]="poi.telefone"
            type="tel"
            placeholder="Telefone"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Horário</ion-label>
          <ion-input
            name="horario"
            [(ngModel)]="poi.horario"
            type="text"
            placeholder="Horário de abertura"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">URL</ion-label>
          <ion-input
            name="url"
            [(ngModel)]="poi.url"
            type="url"
            placeholder="Site ou referência"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Latitude</ion-label>
          <ion-input
            name="latitude"
            [(ngModel)]="poi.latitude"
            (ngModelChange)="atualizarNomePorGeolocalizacao()"
            type="number"
            step="any"
            placeholder="Latitude"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Longitude</ion-label>
          <ion-input
            name="longitude"
            [(ngModel)]="poi.longitude"
            (ngModelChange)="atualizarNomePorGeolocalizacao()"
            type="number"
            step="any"
            placeholder="Longitude"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Nota</ion-label>
          <ion-input
            name="nota"
            [(ngModel)]="poi.nota"
            type="text"
            placeholder="Notas pessoais sobre o POI"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Custo (€)</ion-label>
          <ion-input
            name="custo"
            [(ngModel)]="poi.custo"
            type="number"
            step="0.01"
            placeholder="Custo em euros"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Categoria</ion-label>
          <ion-select
            name="categoria"
            [(ngModel)]="poi.categoria"
            placeholder="Selecione uma categoria"
          >
            <ion-select-option value="gastronomia">Gastronomia</ion-select-option>
            <ion-select-option value="cultura">Cultura</ion-select-option>
            <ion-select-option value="natureza">Natureza</ion-select-option>
            <ion-select-option value="aventura">Aventura</ion-select-option>
            <ion-select-option value="compras">Compras</ion-select-option>
            <ion-select-option value="hospedagem">Hospedagem</ion-select-option>
            <ion-select-option value="outro">Outro</ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item>
          <ion-label>Avaliação (Estrelas)</ion-label>
          <div slot="end" class="stars-container">
            <ion-button
              *ngFor="let star of [1, 2, 3, 4, 5]"
              fill="clear"
              size="small"
              (click)="poi.avaliacao = star"
              [color]="star <= (poi.avaliacao || 0) ? 'warning' : 'medium'"
            >
              <ion-icon slot="icon-only" name="star"></ion-icon>
            </ion-button>
          </div>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <div class="button-group">
      <ion-button
        expand="block"
        type="submit"
        [disabled]="!poiForm.form.valid"
      >
        <ion-icon slot="start" name="checkmark-circle-outline"></ion-icon>
        Adicionar POI
      </ion-button>
      <ion-button
        expand="block"
        color="medium"
        fill="outline"
        type="button"
        (click)="cancelar()"
      >
        <ion-icon slot="start" name="close-circle-outline"></ion-icon>
        Cancelar
      </ion-button>
    </div>
  </form>
</ion-content>
